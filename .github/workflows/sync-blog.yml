name: Sync blog from Hashnode

on:
  schedule:
    # Every 6 hours (UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync posts
        env:
          HASHNODE_HOST: blog.taxmitrafinance.com
          HASHNODE_TOKEN: ${{ secrets.HASHNODE_TOKEN }}
          SITE_URL: https://taxmitrafinance.com
        run: node scripts/sync-blog.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/blogs.json blog/*.html sitemap.xml 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No blog changes to commit."
          else
            git commit -m "chore: sync blog posts from Hashnode"
            git push
          fi
