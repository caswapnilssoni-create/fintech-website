name: Sync blog from Hashnode

on:
  schedule:
    # Every hour at minute 7 (UTC)
    - cron: '7 * * * *'
  workflow_dispatch: # lets you trigger from GitHub UI -> Actions -> Run workflow
  push:
    branches: [main]
    paths:
      - 'data/blogs.json'           # rebuild HTML if you edit the manifest by hand
      - 'scripts/sync-blog.mjs'     # rebuild HTML on script changes
      - '.github/workflows/sync-blog.yml'
  repository_dispatch:
    types: [hashnode-webhook]       # call from Hashnode/Zapier/etc.: instant publish

permissions:
  contents: write

concurrency:
  group: sync-blog
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync posts
        env:
          HASHNODE_HOST: blog.taxmitrafinance.com
          HASHNODE_TOKEN: ${{ secrets.HASHNODE_TOKEN }}
          SITE_URL: https://taxmitrafinance.com
        run: node scripts/sync-blog.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/blogs.json blog sitemap.xml 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No blog changes to commit."
          else
            git commit -m "chore: sync blog posts from Hashnode [skip ci]"
            git push
          fi
