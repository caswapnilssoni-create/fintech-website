name: Build blog from Markdown

on:
  push:
    branches: [main]
    paths:
      - 'content/blog/**'
      - 'scripts/build-blog.mjs'
      - 'package.json'
      - '.github/workflows/sync-blog.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-blog
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build blog
        env:
          SITE_URL: https://taxmitrafinance.com
        run: npm run build:blog

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/blogs.json blog sitemap.xml 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: rebuild blog from markdown [skip ci]"
            git push
          fi
