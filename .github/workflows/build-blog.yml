name: Build blog from Markdown

on:
  push:
    paths:
      - 'content/blog/**'
      - 'scripts/**'
      - '.github/workflows/build-blog.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build blog
        run: node scripts/build-blog.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add blog/*.html data/blogs.json sitemap.xml

          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: build blog pages"
            git push
          fi
